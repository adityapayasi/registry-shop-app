<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#3b4cca" />
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>रजिस्ट्री दुकान — हिसाब-किताब</title>
<style>
  :root{
    --bg:#eef1f8; --card:#ffffff; --ink:#1b2230; --muted:#67718a;
    --line:#e3e7f1; --brand:#3b4cca; --brand-d:#2c3aa6; --brand2:#2f9e7e; --danger:#d6455b;
    --warn:#c9821a; --ok:#2f9e7e; --chip:#eef1fb; --chip2:#f5f7fc;
    --shadow:0 1px 2px rgba(20,30,60,.06),0 8px 28px rgba(20,30,60,.07);
    --radius:14px;
  }
  html[data-theme="dark"]{
    --bg:#0f1422; --card:#171d2e; --ink:#e7ebf5; --muted:#9aa4bd;
    --line:#27304a; --brand:#5b6cf0; --brand-d:#475ae0; --brand2:#36b48f;
    --chip:#1d2540; --chip2:#161c2e;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 28px rgba(0,0,0,.4);
  }
  html[data-theme="dark"] input,html[data-theme="dark"] select,html[data-theme="dark"] textarea{background:#0f1626;color:var(--ink)}
  html[data-theme="dark"] th{background:#1b2236}
  html[data-theme="dark"] table{background:var(--card)}
  html[data-theme="dark"] tbody tr:hover{background:#1b2236}
  html[data-theme="dark"] .btn.ghost{background:#171d2e}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,"Noto Sans Devanagari",Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:15.5px;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;min-height:44px;min-width:44px}
  button.btn.sm{min-height:auto;min-width:auto}
  button.hbtn,button.hamburger{min-height:44px;min-width:44px}
  a{color:var(--brand);text-decoration:none}
  /* ---------- layout ---------- */
  header.topbar{position:sticky;top:0;z-index:30;background:linear-gradient(120deg,var(--brand),var(--brand-d));color:#fff;display:flex;align-items:center;gap:12px;padding:11px 16px;box-shadow:var(--shadow)}
  header .logo{font-weight:700;font-size:18px;display:flex;align-items:center;gap:9px;white-space:nowrap}
  header .logo .dot{width:26px;height:26px;border-radius:8px;background:#fff;color:var(--brand);display:grid;place-items:center;font-weight:800;font-size:16px}
  header .spacer{flex:1}
  header .shopname{opacity:.95;font-size:14px;max-width:34vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .langtoggle{display:flex;background:rgba(255,255,255,.18);border-radius:999px;overflow:hidden}
  .langtoggle button{border:0;background:transparent;color:#fff;padding:7px 13px;font-weight:600;opacity:.7;font-size:14px}
  .langtoggle button.active{background:#fff;color:var(--brand);opacity:1}
  .hamburger{display:none;border:0;background:rgba(255,255,255,.18);color:#fff;border-radius:8px;padding:7px 11px;font-size:18px}
  .hbtn{border:0;background:rgba(255,255,255,.18);color:#fff;border-radius:8px;padding:7px 11px;font-size:16px;margin-right:8px}
  .hbtn:hover{background:rgba(255,255,255,.3)}
  .layout{display:flex;min-height:calc(100vh - 54px)}
  nav.side{width:218px;background:var(--card);border-right:1px solid var(--line);padding:12px 10px;flex-shrink:0}
  nav.side a{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:11px;color:var(--ink);margin-bottom:3px;font-weight:500;font-size:15px}
  nav.side a .ic{width:22px;text-align:center;font-size:17px}
  nav.side a:hover{background:var(--chip)}
  nav.side a{cursor:pointer}
  nav.side a:focus-visible,.btn:focus-visible{outline:3px solid #8e9bff;outline-offset:2px}
  nav.side a.active{background:var(--brand);color:#fff;box-shadow:0 4px 14px rgba(59,76,202,.32)}
  nav.side a .pill{margin-left:auto;background:var(--danger);color:#fff;font-size:11px;font-weight:700;border-radius:999px;padding:1px 7px;min-width:20px;text-align:center}
  nav.side a.active .pill{background:#fff;color:var(--danger)}
  main.content{flex:1;padding:20px 22px;max-width:100%;overflow-x:auto}
  /* ---------- components ---------- */
  .pagehead{display:flex;align-items:center;gap:12px;margin:0 0 18px;flex-wrap:wrap}
  .pagehead h2{margin:0;font-size:22px}
  .pagehead .sub{color:var(--muted);font-size:13px;margin-top:3px}
  .pagehead .spacer{flex:1}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-bottom:20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
  .stat{display:flex;flex-direction:column;gap:6px}
  .stat .lbl{color:var(--muted);font-size:13px;display:flex;align-items:center;gap:6px}
  .stat .val{font-size:23px;font-weight:700;font-variant-numeric:tabular-nums}
  .stat.good .val{color:var(--ok)} .stat.bad .val{color:var(--danger)} .stat.warn .val{color:var(--warn)} .stat.brand .val{color:var(--brand)}
  .btn{border:0;border-radius:11px;padding:10px 15px;font-weight:600;background:var(--brand);color:#fff;display:inline-flex;align-items:center;gap:6px;font-size:14.5px;transition:filter .12s,transform .04s}
  .btn:hover{filter:brightness(1.06)} .btn:active{transform:translateY(1px)}
  .btn.sec{background:var(--chip);color:var(--brand)}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn.green{background:var(--brand2)} .btn.red{background:var(--danger)} .btn.warn{background:var(--warn)}
  .btn.sm{padding:7px 11px;font-size:13px;border-radius:9px}
  .btn.big{padding:13px 20px;font-size:16px}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  table{width:100%;border-collapse:collapse;background:var(--card);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
  th,td{padding:11px 13px;text-align:left;border-bottom:1px solid var(--line);font-size:14px;white-space:nowrap}
  th{background:#f7f9ff;color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px}
  tr:last-child td{border-bottom:0}
  tbody tr:hover{background:#fafbff}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .tablewrap{overflow-x:auto;border-radius:12px}
  .pager{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px}
  .pager .info{color:var(--muted);font-size:13px}
  .pager .spacer{flex:1}
  .pager button[disabled]{opacity:.45;cursor:default}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;white-space:nowrap}
  .badge.income{background:#e6f6ef;color:#1d7a57} .badge.expense{background:#fde9ec;color:#b62a40}
  .badge.gray{background:#eef1f6;color:#5a6577} .badge.blue{background:#e8ebfb;color:#2f3da8}
  .badge.warn{background:#fdf0db;color:#9a6411} .badge.part{background:#fff3d6;color:#946200}
  .empty{padding:44px;text-align:center;color:var(--muted)}
  .empty .big{font-size:34px;display:block;margin-bottom:10px;opacity:.7}
  .toolbar{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:15px}
  .toolbar .grp{display:flex;gap:6px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:10px;padding:4px 8px}
  .toolbar .grp span{color:var(--muted);font-size:13px}
  input,select,textarea{font-family:inherit;font-size:15px;padding:10px 11px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);width:100%}
  input:focus,select:focus,textarea:focus{outline:2px solid #c7cdf5;border-color:var(--brand)}
  input[type=date],input[type=month]{min-width:0}
  .search{max-width:280px}
  label.fld{display:block;margin-bottom:14px}
  label.fld .lt{display:block;font-size:13.5px;color:var(--ink);margin-bottom:6px;font-weight:600}
  label.fld .help{font-size:12.5px;color:var(--muted);margin:5px 2px 0;line-height:1.4}
  label.fld .err{font-size:12.5px;color:var(--danger);margin:5px 2px 0;font-weight:600;display:none}
  label.fld.bad input,label.fld.bad select,label.fld.bad textarea{border-color:var(--danger);outline-color:#f3b9c4}
  label.fld.bad .err{display:block}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  /* ---------- modal ---------- */
  .modal-bg{position:fixed;inset:0;background:rgba(15,22,40,.5);display:none;z-index:50;align-items:flex-start;justify-content:center;padding:28px 14px;overflow:auto}
  .modal-bg.show{display:flex}
  .modal{background:var(--card);border-radius:18px;max-width:600px;width:100%;box-shadow:0 24px 70px rgba(0,0,0,.3);animation:pop .15s ease}
  .modal.wide{max-width:760px}
  @keyframes pop{from{transform:translateY(10px);opacity:.5}to{transform:none;opacity:1}}
  .modal h3{margin:0;padding:17px 22px;border-bottom:1px solid var(--line);font-size:18px;display:flex;align-items:center;gap:8px}
  .modal .body{padding:20px 22px;max-height:66vh;overflow:auto}
  .modal .foot{padding:15px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
  .modal .foot .spacer{flex:1}
  /* ---------- misc ---------- */
  .ledger-grid{display:grid;grid-template-columns:300px 1fr;gap:16px}
  .clist{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;max-height:70vh;overflow-y:auto}
  .clist .ci{padding:13px 15px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;justify-content:space-between;gap:8px;align-items:center}
  .clist .ci:hover{background:var(--chip)}
  .clist .ci.active{background:var(--brand);color:#fff}
  .clist .ci .bal{font-weight:700;font-variant-numeric:tabular-nums}
  .hint{background:#fff8ec;border:1px solid #f0dcae;color:#7a5a14;padding:11px 13px;border-radius:11px;font-size:13.5px;margin-bottom:15px;line-height:1.5}
  .hint b{color:#5e4410}
  .warnbar{background:#fde9ec;border:1px solid #f3b9c4;color:#9a2336;padding:11px 15px;border-radius:11px;margin-bottom:15px;font-size:14px}
  .alertbar{display:flex;align-items:center;gap:12px;background:#fff6e6;border:1px solid #f3d79a;color:#7a5713;padding:12px 15px;border-radius:12px;margin-bottom:15px;font-size:14px}
  .alertbar.danger{background:#fdecee;border-color:#f3b9c4;color:#9a2336}
  .alertbar .spacer{flex:1}
  .savechip{font-size:12.5px;opacity:.85;min-width:64px;text-align:right}
  .sectionttl{margin:24px 0 11px;font-size:16px;display:flex;align-items:center;gap:8px}
  /* ---------- toast ---------- */
  #toasts{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:10px;align-items:center;width:max-content;max-width:92vw}
  .toast{background:#1b2230;color:#fff;padding:12px 16px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.3);display:flex;align-items:center;gap:14px;font-size:14.5px;animation:tin .18s ease}
  .toast.good{background:#1d7a57} .toast.bad{background:#b62a40} .toast.warn{background:#9a6411}
  .toast button{background:rgba(255,255,255,.22);color:#fff;border:0;border-radius:8px;padding:6px 12px;font-weight:700;font-size:13.5px}
  @keyframes tin{from{transform:translateY(12px);opacity:0}to{transform:none;opacity:1}}
  .kbd{font-size:11px;background:var(--chip);color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-weight:600}
  @media(max-width:860px){
    nav.side{position:fixed;left:-240px;top:54px;bottom:0;transition:.2s;z-index:40;box-shadow:var(--shadow)}
    nav.side.open{left:0}
    .hamburger{display:inline-block}
    .ledger-grid{grid-template-columns:1fr}
    .row2,.row3{grid-template-columns:1fr}
    header .shopname{display:none}
  }
  @media print{
    header.topbar,nav.side,.toolbar,.pagehead .btn,.no-print,#toasts,.alertbar,.hint{display:none!important}
    main.content{padding:0}
    body{background:#fff}
    .card{box-shadow:none;border:1px solid #ccc}
  }
</style>
</head>
<body>
<header class="topbar">
  <button class="hamburger" onclick="document.querySelector('nav.side').classList.toggle('open')" aria-label="menu">☰</button>
  <div class="logo"><span class="dot">र</span><span data-i18n="appName">रजिस्ट्री दुकान</span></div>
  <span class="shopname" id="shopNameTop"></span>
  <div class="spacer"></div>
  <input type="text" id="globalSearch" placeholder="${L('सब कुछ खोजें...','Search everything...')}" style="width:220px;border-radius:999px;padding:7px 14px;font-size:13px;background:rgba(255,255,255,.22);color:#fff;border:0;outline:none" oninput="doGlobalSearch(this.value)" onkeydown="if(event.key==='Enter')doGlobalSearch(this.value)">
  <span class="savechip" id="saveChip"></span>
  <span class="savechip" id="syncChip" style="display:none;cursor:pointer" onclick="syncNow()" title="मल्टी-डिवाइस सिंक / Multi-device sync"></span>
  <button class="hbtn" onclick="helpModal()" title="मदद / Help" aria-label="Help">❔</button>
  <div class="langtoggle">
    <button id="langHi" onclick="setLang('hi')" onkeydown="if(event.key==='Enter'||event.key===' ')setLang('hi')" aria-pressed="true">हिं</button>
    <button id="langEn" onclick="setLang('en')" onkeydown="if(event.key==='Enter'||event.key===' ')setLang('en')" aria-pressed="false">EN</button>
  </div>
</header>

<div class="layout">
  <nav class="side" id="sidenav" aria-label="${L('मुख्य मेनू','Main menu')}">
    <a data-view="dashboard" tabindex="0" role="link" aria-label="${L('डैशबोर्ड','Dashboard')}" onclick="showView('dashboard')"><span class="ic">🏠</span><span data-i18n="nav.dashboard">डैशबोर्ड</span></a>
    <a data-view="income"    tabindex="0" role="link" aria-label="${L('आय-खर्च','Income / Expense')}" onclick="showView('income')"><span class="ic">💵</span><span data-i18n="nav.income">आय-खर्च</span></a>
    <a data-view="registry"  tabindex="0" role="link" aria-label="${L('रजिस्ट्री','Registry')}" onclick="showView('registry')"><span class="ic">📑</span><span data-i18n="nav.registry">रजिस्ट्री</span></a>
    <a data-view="pending"   tabindex="0" role="link" aria-label="${L('बकाया वसूली','Pending Dues')}" onclick="showView('pending')"><span class="ic">⏳</span><span data-i18n="nav.pending">बकाया वसूली</span><span class="pill" id="pendingPill" style="display:none" aria-label="${L('बकाया गिनती','Due count')}"></span></a>
    <a data-view="ledger"    tabindex="0" role="link" aria-label="${L('उधार खाता','Udhaar Ledger')}" onclick="showView('ledger')"><span class="ic">📒</span><span data-i18n="nav.ledger">उधार खाता</span></a>
    <a data-view="salary"    tabindex="0" role="link" aria-label="${L('सैलरी','Salary')}" onclick="showView('salary')"><span class="ic">👷</span><span data-i18n="nav.salary">सैलरी</span></a>
    <a data-view="bank"      tabindex="0" role="link" aria-label="${L('बैंक','Bank')}" onclick="showView('bank')"><span class="ic">🏦</span><span data-i18n="nav.bank">बैंक</span></a>
    <a data-view="reports"   tabindex="0" role="link" aria-label="${L('रिपोर्ट','Reports')}" onclick="showView('reports')"><span class="ic">📊</span><span data-i18n="nav.reports">रिपोर्ट</span></a>
    <a data-view="backup"    tabindex="0" role="link" aria-label="${L('बैकअप/सेटिंग','Backup / Settings')}" onclick="showView('backup')"><span class="ic">⚙️</span><span data-i18n="nav.backup">बैकअप/सेटिंग</span></a>
    <a data-view="analytics"   tabindex="0" role="link" onclick="showView('analytics')"><span class="ic">📊</span><span data-i18n="nav.analytics">एनालिटिक्स</span></a>
    <a data-view="reminders"   tabindex="0" role="link" onclick="showView('reminders')"><span class="ic">🔔</span><span data-i18n="nav.reminders">रिमाइंडर</span></a>
    <a data-view="smartSearch" tabindex="0" role="link" onclick="showView('smartSearch')"><span class="ic">🔍</span><span data-i18n="nav.smartSearch">स्मार्ट खोज</span></a>
    <a data-view="templates"  tabindex="0" role="link" onclick="showView('templates')"><span class="ic">📝</span><span data-i18n="nav.templates">टेंप्लेट</span></a>
    <a data-view="recurring"  tabindex="0" role="link" onclick="showView('recurring')"><span class="ic">🔄</span><span data-i18n="nav.recurring">नियमित ग्राहक</span></a>
    <a data-view="govt"       tabindex="0" role="link" onclick="showView('govt')"><span class="ic">🏛️</span><span data-i18n="nav.govt">सरकारी पोर्टल</span></a>
  </nav>
  <main class="content" id="content"></main>
</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>
<div id="toasts" role="status" aria-live="polite" aria-relevant="additions"></div>

<script>
/* ============================================================
   रजिस्ट्री दुकान — हिसाब-किताब  (single-file app, no install)
   डेटा localStorage में आपके PC पर ही रहता है। बैकअप ज़रूर लें।
   v2 — data-safe, undo, validation, receipts, pending, exports
   ============================================================ */

/* ---------- Excel support: lazy-load XLSX library from CDN when needed ---------- */
let _xlsxLoaded=false;
function loadXLSX(){
  return new Promise((res,rej)=>{
    if(_xlsxLoaded || typeof XLSX!=='undefined'){ _xlsxLoaded=true; res(true); return; }
    const s=document.createElement('script');
    s.src='https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js';
    s.onload=()=>{ _xlsxLoaded=true; res(true); };
    s.onerror=()=>rej(false);
    document.head.appendChild(s);
  });
}

/* ---------- storage layer ----------
   Durability strategy:
   • IndexedDB = primary durable store (large capacity, async) — survives even if localStorage quota is hit.
   • localStorage = fast synchronous mirror, used to bootstrap instantly on load.
   A save writes BOTH; if localStorage throws (quota/blocked) the data is still safe in IndexedDB,
   so a quota error is no longer fatal — we just warn and nudge a backup. */
const KEY='registry_shop_app_v1';            /* same key → पुराना डेटा सुरक्षित */
const AUTO_KEY='registry_shop_app_v1_auto';  /* rolling auto-snapshots */
const SCHEMA_VERSION=5;
const IDB_NAME='registry_shop_db', IDB_STORE='kv', IDB_KEY='main';

function defaultData(){
  return {
    meta:{ version:SCHEMA_VERSION, savedAt:'' },
    settings:{ shopName:'', shopAddress:'', shopPhone:'', lang:'hi', currency:'₹', lastBackup:'',
      theme:'light', fontScale:1, gstEnabled:false, gstRate:18, gstin:'', passcode:'', passcodeHash:'',
      autoBackupDaily:true, lastAutoBackup:'', backupFolderName:'', onboarded:false, demoLoaded:false,
      syncEnabled:false, syncKey:'', syncRev:0, lastSyncAt:'',
      state:'mp', telegramBotToken:'', pushEnabled:false, currentUser:null, users:[],
      incomeCategories:['Registry Fee','Consultation','Stamp Sale','Other'],
      expenseCategories:['Rent','Electricity','Salary','Stationery','Travel','Other'] },
    transactions:[], workers:[], salaryPayments:[],
    customers:[], ledgerEntries:[],
    bankAccounts:[], bankTransactions:[],
    registryDocs:[], recurring:[], auditLog:[]
  };
}
/* Strip prototype-pollution vectors (__proto__/prototype/constructor) from any
   parsed, untrusted JSON — storage, backups, sync blobs, cross-tab — before it
   enters app state. Self-contained so it is safe to use during initial load. */
function _sanitizeParsed(value){
  if(Array.isArray(value)) return value.map(_sanitizeParsed);
  if(value && typeof value==='object'){
    const out={};
    for(const k of Object.keys(value)){
      if(k==='__proto__'||k==='prototype'||k==='constructor') continue;
      out[k]=_sanitizeParsed(value[k]);
    }
    return out;
  }
  return value;
}
/* migrate keeps old data working as the schema grows */
function migrate(d){
  d=_sanitizeParsed(d);
  const base=defaultData();
  const out=Object.assign({}, base, d);
  out.meta=Object.assign({}, base.meta, d.meta||{});
  out.settings=Object.assign({}, base.settings, d.settings||{});
  ['transactions','workers','salaryPayments','customers','ledgerEntries','bankAccounts','bankTransactions','registryDocs','recurring','auditLog']
    .forEach(k=>{ if(!Array.isArray(out[k])) out[k]=[]; });
  /* v3→v4: revert paise (×100) back to rupees. v2→v3 ×100 migration removed. */
  var _oldVer=(d.meta&&d.meta.version)||0;
  if(_oldVer>=3 && _oldVer<4){
    var _amtTables={transactions:['amount'],registryDocs:['stampDuty','regFee','serviceCharge','received','consideration','gst'],ledgerEntries:['amount'],salaryPayments:['amount'],bankAccounts:['balance'],bankTransactions:['amount'],workers:['salary']};

/* ---------- 3-way merge for multi-device sync ----------
   Identical logic to netlify/functions/sync.mjs. Given the snapshot we last
   synced (base), the other side's document (other) and our current document
   (mine), produce a merge that keeps additions from both devices, resolves
   edits, and propagates deletes. No per-record timestamps needed — intent is
   inferred by diffing each side against base. Conflicts prefer `mine`.
   NOTE: the block between the @merge3 markers below is extracted verbatim by
   test/merge3.test.mjs and run against the server copy — keep them in lockstep. */
/* @merge3-shared-start */
const SYNC_ARRAYS=['transactions','registryDocs','customers','ledgerEntries','workers',
  'salaryPayments','bankAccounts','bankTransactions','recurring'];
/* Keys that must never be copied from untrusted input (prototype pollution). */
const FORBIDDEN_KEYS=new Set(['__proto__','prototype','constructor']);
function _safeKeys(o){ return Object.keys(o||{}).filter(k=>!FORBIDDEN_KEYS.has(k)); }
function _eq(a,b){ return JSON.stringify(a)===JSON.stringify(b); }
function _pickRecord(inBase,inOther,inMine){
  const mineChanged  = inMine !=null && (inBase==null || !_eq(inMine,inBase));
  const otherChanged = inOther!=null && (inBase==null || !_eq(inOther,inBase));
  if(inMine!=null && inOther!=null){
    if(mineChanged && !otherChanged) return inMine;
    if(otherChanged && !mineChanged) return inOther;
    return inMine;                        /* both changed (or neither) → prefer mine */
  }
  if(inMine!=null && inOther==null){ return (inBase==null||mineChanged)? inMine : null; }
  if(inMine==null && inOther!=null){ return (inBase==null||otherChanged)? inOther : null; }
  return null;                            /* only in base → deleted on both sides */
}
function _mergeArray(baseArr,otherArr,mineArr){
  const idx=a=>{ const m=new Map(); (a||[]).forEach(r=>{ if(r&&r.id!=null) m.set(r.id,r); }); return m; };
  const b=idx(baseArr), o=idx(otherArr), l=idx(mineArr);
  const ids=new Set([...b.keys(),...o.keys(),...l.keys()]);
  const seen=new Set(), order=[];
  (mineArr||[]).forEach(r=>{ if(r&&r.id!=null&&!seen.has(r.id)){ seen.add(r.id); order.push(r.id); } });
  (otherArr||[]).forEach(r=>{ if(r&&r.id!=null&&!l.has(r.id)&&!seen.has(r.id)){ seen.add(r.id); order.push(r.id); } });
  ids.forEach(id=>{ if(!seen.has(id)) order.push(id); });
  const out=[];
  for(const id of order){ if(!ids.has(id)) continue; ids.delete(id);
    const rec=_pickRecord(b.get(id),o.get(id),l.get(id)); if(rec!=null) out.push(rec); }
  return out;
}
function _mergeSettings(base,other,mine){
  base=base||{}; other=other||{}; mine=mine||{};
  const keys=new Set([..._safeKeys(other),..._safeKeys(mine),..._safeKeys(base)]);
  const out={};
  keys.forEach(k=>{
    const rec=_pickRecord(
      base[k]===undefined?null:{v:base[k]},
      other[k]===undefined?null:{v:other[k]},
      mine[k]===undefined?null:{v:mine[k]});
    if(rec!=null) out[k]=rec.v;
  });
  return out;
}
function _mergeAudit(other,mine){
  const seen=new Set(), out=[];
  [...(mine||[]),...(other||[])].forEach(e=>{ if(!e) return;
    const k=(e.at||'')+'|'+(e.action||''); if(seen.has(k)) return; seen.add(k); out.push(e); });
  out.sort((a,b)=>String(b.at||'').localeCompare(String(a.at||'')));
  return out.slice(0,60);
}
function merge3(base,other,mine){
  if(!other) return mine||base||null;
  if(!mine)  return other;
  base=base||{};
  /* Build by hand, skipping prototype-pollution keys Object.assign would copy. */
  const out={};
  _safeKeys(other).forEach(k=>{ out[k]=other[k]; });
  _safeKeys(mine).forEach(k=>{ out[k]=mine[k]; });
  SYNC_ARRAYS.forEach(k=>{ out[k]=_mergeArray(base[k],other[k],mine[k]); });
  out.settings=_mergeSettings(base.settings,other.settings,mine.settings);
  out.auditLog=_mergeAudit(other.auditLog,mine.auditLog);
  const oAt=(other.meta&&other.meta.savedAt)||'', mAt=(mine.meta&&mine.meta.savedAt)||'';
  out.meta=(mAt>=oAt? mine.meta : other.meta)||{};
  return out;
}
/* @merge3-shared-end */

/* --- IndexedDB helpers (promise-wrapped, best-effort) --- */
let _idb=null;
function idbOpen(){
  if(_idb) return Promise.resolve(_idb);
  return new Promise((res,rej)=>{
    let r; try{ r=indexedDB.open(IDB_NAME,1); }catch(e){ return rej(e); }
    r.onupgradeneeded=()=>{ try{ r.result.createObjectStore(IDB_STORE); }catch(e){} };
    r.onsuccess=()=>{ _idb=r.result; res(_idb); };
    r.onerror=()=>rej(r.error);
  });
}
async function idbSet(v){ const db=await idbOpen(); return new Promise((res,rej)=>{ const tx=db.transaction(IDB_STORE,'readwrite'); tx.objectStore(IDB_STORE).put(v,IDB_KEY); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }
async function idbGet(){ const db=await idbOpen(); return new Promise((res,rej)=>{ const tx=db.transaction(IDB_STORE,'readonly'); const rq=tx.objectStore(IDB_STORE).get(IDB_KEY); rq.onsuccess=()=>res(rq.result); rq.onerror=()=>rej(rq.error); }); }

function save(){
  clearBalCache();
  DB.meta.savedAt=nowStamp();
  const json=JSON.stringify(DB);
  let lsOK=true;
  try{ localStorage.setItem(KEY, json); }catch(e){ lsOK=false; }
  /* mirror to IndexedDB (durable, high-capacity) — async, non-blocking */
  idbSet(json).then(()=>{ storageOK=true; }).catch(()=>{
    if(!lsOK){ storageOK=false;
      toast(L('⚠️ डेटा सेव नहीं हो पाया! जगह भर गई या ब्राउज़र ने रोका। अभी बैकअप डाउनलोड करें।',
              '⚠️ Could not save! Storage full or blocked. Download a backup now.'),
            {type:'bad', sticky:true, actionLabel:L('बैकअप','Backup'), onAction:()=>exportBackup()});
    }
  });
  if(lsOK){ storageOK=true; } else {
    /* localStorage full but IndexedDB likely fine → warn softly, not fatal */
    toast(L('ℹ️ तेज़-मेमोरी भर गई — डेटा सुरक्षित डेटाबेस में सेव हो रहा है। कभी-कभी बैकअप ज़रूर लें।',
            'ℹ️ Fast memory full — data is saving to the durable database. Please take a backup sometime.'),
          {type:'warn'});
  }
  flashSaved(); autoSnapshot(); maybeAutoBackup();
  try{ syncSchedulePush(); }catch(e){} /* push to cloud (multi-device sync) — no-op if sync is off */
}

/* remember focus + caret across a full re-render (search boxes type one char then

    let s=null,e=null; try{ s=el.selectionStart; e=el.selectionEnd; }catch(_){}

/* ---------- toast + undo ---------- */
function toast(msg,opts={}){
  const wrap=document.getElementById('toasts');
  const el=document.createElement('div');
  el.className='toast '+(opts.type||'');
  el.innerHTML=`<span>${esc(msg)}</span>`;
  if(opts.actionLabel){
    const b=document.createElement('button'); b.textContent=opts.actionLabel;
    b.onclick=()=>{ el.remove(); if(opts.onAction)opts.onAction(); };
    el.appendChild(b);
  }
  wrap.appendChild(el);
  if(!opts.sticky){ setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, opts.duration||4200); }
}
let _undoStack=[], _redoStack=[];
const MAX_UNDO=50;
/* delete/edit safely: snapshot → mutate → offer Undo (no scary confirm needed) */
function withUndo(label, mutate){
  const snap=JSON.stringify(DB);
  mutate(); audit(label); save(); render();
  _undoStack.push(snap); if(_undoStack.length>MAX_UNDO) _undoStack.shift();
  _redoStack=[];
  toast(label, {actionLabel:L('↩ वापस लाएँ','↩ Undo'), duration:6000, onAction:()=>{ undo(); }});
}
function undo(){
  if(!_undoStack.length){ toast(L('वापस लेने को कुछ नहीं','Nothing to undo'),{type:'warn'}); return; }
  _redoStack.push(JSON.stringify(DB));
  const snap=_undoStack.pop();
  replaceDB(JSON.parse(snap)); save(); applyStaticI18n(); render();
  toast(L('वापस आ गया','Restored'),{type:'good'});
}

  if(!_redoStack.length){ toast(L('फिर से करने को कुछ नहीं','Nothing to redo'),{type:'warn'}); return; }
  _undoStack.push(JSON.stringify(DB));
  const snap=_redoStack.pop();
  replaceDB(JSON.parse(snap)); save(); applyStaticI18n(); render();
  toast(L('फिर से हो गया','Redone'),{type:'good'});
}

/* ---------- modal + validated form ---------- */
function openModal(html,wide){ const b=document.getElementById('modalBox'); b.className='modal'+(wide?' wide':''); b.innerHTML=html; document.getElementById('modalBg').classList.add('show'); }
function closeModal(){ document.getElementById('modalBg').classList.remove('show'); _formCb=null; _formFields=null; }
/* field: {key,label,type,options?,value?,required?,help?,placeholder?,allowNeg?,half?,step?} */
let _formCb=null,_formFields=null;
function formModal(title, fields, values, onSubmit, opts={}){
  _formCb=onSubmit; _formFields=fields;
  const renderField=f=>{
    if(f.type==='info'){ return `<div class="hint" style="grid-column:1/-1">${f.label}</div>`; }
    const v=values && values[f.key]!=null ? values[f.key] : (f.value!=null?f.value:'');
    let input='';
    if(f.type==='select'){
      input=`<select id="f_${f.key}" oninput="clearErr('${f.key}')">${f.options.map(o=>`<option value="${esc(o.v)}" ${String(o.v)===String(v)?'selected':''}>${esc(o.t)}</option>`).join('')}</select>`;
    }else if(f.type==='textarea'){
      input=`<textarea id="f_${f.key}" rows="2" oninput="clearErr('${f.key}')" ${f.placeholder?`placeholder="${esc(f.placeholder)}"`:''}>${esc(v)}</textarea>`;
    }else{
      const step=f.type==='number'?`step="${f.step||'0.01'}" inputmode="decimal"`:'',
            list=f.list?`list="list_${f.key}"`:'',
            listHtml=f.list?`<datalist id="list_${f.key}">${f.list.map(o=>`<option value="${esc(o)}">`).join('')}</datalist>`:'';
      input=`<input id="f_${f.key}" type="${f.type||'text'}" value="${esc(v)}" ${step} ${list} oninput="clearErr('${f.key}')" ${f.placeholder?`placeholder="${esc(f.placeholder)}"`:''}/>${listHtml}`;
    }
    return `<label class="fld" id="fld_${f.key}"><span class="lt">${esc(f.label)}${f.required?' <span style="color:var(--danger)">*</span>':''}</span>${input}
      ${f.help?`<span class="help">💡 ${esc(f.help)}</span>`:''}<span class="err" id="err_${f.key}"></span></label>`;
  };
  /* group consecutive half-fields into a 2-column row */
  let body='',i=0;
  while(i<fields.length){
    const f=fields[i];
    if(f.half && fields[i+1] && fields[i+1].half){ body+=`<div class="row2">${renderField(f)}${renderField(fields[i+1])}</div>`; i+=2; }
    else { body+=renderField(f); i++; }
  }
  openModal(`
    <h3>${esc(title)}</h3>
    <div class="body">${body}</div>
    <div class="foot">
      <span class="help no-print" style="align-self:center;color:var(--muted)"><span class="kbd">Enter</span> ${L('सेव','save')} · <span class="kbd">Esc</span> ${L('बंद','close')}</span>
      <div class="spacer"></div>
      <button class="btn ghost" onclick="closeModal()">${L('रद्द','Cancel')}</button>
      <button class="btn" onclick="submitForm()">${esc(opts.saveLabel||L('💾 सेव करें','💾 Save'))}</button>
    </div>`, opts.wide);
  const first=document.querySelector('#modalBox input,#modalBox select,#modalBox textarea'); if(first) setTimeout(()=>first.focus(),30);
}
function clearErr(k){ const l=document.getElementById('fld_'+k); if(l)l.classList.remove('bad'); }
function setErr(k,msg){ const l=document.getElementById('fld_'+k),e=document.getElementById('err_'+k); if(l)l.classList.add('bad'); if(e)e.textContent=msg; }
function submitForm(){
  const box=document.getElementById('modalBox'); const out={};
  box.querySelectorAll('[id^="f_"]').forEach(el=>{ out[el.id.slice(2)]=el.value.trim(); });
  let ok=true,firstBad=null;
  (_formFields||[]).forEach(f=>{
    const val=out[f.key];
    if(f.required && (val==null||val==='')){ setErr(f.key,L('यह ज़रूरी है','Required')); ok=false; firstBad=firstBad||f.key; return; }
    if(f.type==='number' && val!==''){
      const raw=String(val).replace(/[, ₹]/g,'');
      if(isNaN(parseFloat(raw))){ setErr(f.key,L('सही संख्या डालें','Enter a valid number')); ok=false; firstBad=firstBad||f.key; }
      else if(!f.allowNeg && num(val)<0){ setErr(f.key,L('रकम ऋणात्मक नहीं हो सकती','Cannot be negative')); ok=false; firstBad=firstBad||f.key; }
    }
    if(f.type==='date' && f.required && val && isNaN(new Date(val).getTime())){ setErr(f.key,L('सही तारीख़ डालें','Enter a valid date')); ok=false; firstBad=firstBad||f.key; }
  });
  if(!ok){ const el=document.getElementById('f_'+firstBad); if(el)el.focus(); return; }
  if(_formCb) _formCb(out);
}

/* ---------- helpers: stale dues & chart ---------- */
function stalePendingItems(){
  const stale=[];
  const t=today();
  DB.registryDocs.forEach(r=>{
    if(registryDue(r)>0 && daysBetween(r.date,t)>30) stale.push({type:'reg',name:(r.party1||r.party2||r.docNo),date:r.date,amount:registryDue(r),id:r.id});
  });
  DB.customers.forEach(c=>{
    const bal=customerBalance(c.id);
    if(bal>0){
      const lastEntry=DB.ledgerEntries.filter(e=>e.customerId===c.id).sort((a,b)=>b.date.localeCompare(a.date))[0];
      if(!lastEntry || daysBetween(lastEntry.date,t)>30) stale.push({type:'ledger',name:c.name,date:lastEntry?lastEntry.date:c.createdAt?new Date(c.createdAt).toISOString().slice(0,10):t,amount:bal,id:c.id});
    }
  });
  return stale.sort((a,b)=>b.amount-a.amount);
}
function drawTrendChart(canvasId){
  const canvas=document.getElementById(canvasId); if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const d7=Array.from({length:7},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-(6-i)); return d.toISOString().slice(0,10); });
  const inc=d7.map(d=>sum(DB.transactions.filter(x=>x.date===d&&x.type==='income')));
  const exp=d7.map(d=>sum(DB.transactions.filter(x=>x.date===d&&x.type==='expense')));
  const max=Math.max(...inc,...exp,1);
  const W=canvas.width, H=canvas.height, P=22, barW=(W-2*P)/7*0.35, gap=(W-2*P)/7;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--bg')||'#eef1f8';
  ctx.fillRect(0,0,W,H);
  d7.forEach((d,i)=>{
    const x=P+i*gap+gap*0.1;
    const hI=(inc[i]/max)*(H-2*P), hE=(exp[i]/max)*(H-2*P);
    ctx.fillStyle='#2f9e7e'; ctx.fillRect(x,H-P-hI,barW,hI);
    ctx.fillStyle='#d6455b'; ctx.fillRect(x+barW+2,H-P-hE,barW,hE);
    ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--muted')||'#67718a';
    ctx.font='10px sans-serif'; ctx.textAlign='center';
    ctx.fillText(d.slice(5),x+barW,H-6);
  });
  ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--ink')||'#1b2230';
  ctx.font='bold 11px sans-serif'; ctx.textAlign='left';
  ctx.fillText('▲ '+L('आय','Income'),P,14); ctx.fillStyle='#d6455b'; ctx.fillText('▲ '+L('खर्च','Expense'),P+90,14);
}

function doGlobalSearch(q){
  q=String(q).trim().toLowerCase();
  if(!q){ state.view='dashboard'; render(); return; }
  const results=[];
  DB.customers.forEach(c=>{ if(c.name.toLowerCase().includes(q)||c.phone.includes(q)) results.push({type:'customer',name:c.name,subtitle:c.phone,action:()=>{ state.view='ledger'; state.selectedCustomer=c.id; render(); }}); });
  DB.registryDocs.forEach(r=>{ if((r.docNo||'').toLowerCase().includes(q)||(r.party1||'').toLowerCase().includes(q)||(r.party2||'').toLowerCase().includes(q)||(r.property||'').toLowerCase().includes(q)) results.push({type:'registry',name:r.docNo||'-',subtitle:(r.party1||'')+' '+(r.property||''),action:()=>{ state.view='registry'; render(); }}); });
  DB.transactions.forEach(t=>{ if((t.category||'').toLowerCase().includes(q)||(t.note||'').toLowerCase().includes(q)) results.push({type:'tx',name:(t.category||'-'),subtitle:fmtDate(t.date)+' '+money(t.amount),action:()=>{ state.view='income'; render(); }}); });
  const el=document.getElementById('content');
  el.innerHTML=`<div class="pagehead"><h2>🔍 ${L('खोज के नतीजे','Search Results')}</h2><div class="spacer"></div><button class="btn ghost" onclick="document.getElementById('globalSearch').value='';doGlobalSearch('')">${L('बंद','Close')}</button></div>
    ${results.length? tableHTML([L('प्रकार','Type'),L('नाम/संख्या','Name/No.'),L('विवरण','Details'),''],

}

const EXPENSE_CATS=()=>DB.settings.expenseCategories||[L('किराया','Rent'),L('बिजली बिल','Electricity'),L('सैलरी','Salary'),L('स्टेशनरी','Stationery')];
function findTx(id){ const x=byId(DB.transactions,id); return x?{...x}:{}; }
function addTx(type,vals){
  const cats=(type==='income'?INCOME_CATS():EXPENSE_CATS());
  formModal(vals&&vals.id?(type==='income'?L('आय एडिट','Edit Income'):L('खर्च एडिट','Edit Expense')):(type==='income'?L('नई आय जोड़ें','Add Income'):L('नया खर्च जोड़ें','Add Expense')),[
    {key:'date',label:L('तारीख़','Date'),type:'date',value:today(),required:true,half:true},
    {key:'amount',label:L('रकम','Amount'),type:'number',required:true,placeholder:'0',half:true,help:L('सिर्फ़ संख्या, जैसे 500','Numbers only, e.g. 500')},
    {key:'category',label:L('श्रेणी','Category'),type:'select',options:cats.map(c=>({v:c,t:c})),value:vals&&vals.id?vals.category:(cats[0]||''),half:true},
    {key:'mode',label:L('भुगतान का तरीका','Payment Mode'),type:'select',options:MODE_OPTS(),value:'cash',half:true},
    {key:'note',label:L('नोट (वैकल्पिक)','Note (optional)'),type:'textarea'},
  ], vals||{}, o=>{
    if(vals&&vals.id){ withUndo(L('एंट्री बदली','Entry updated'),()=>Object.assign(byId(DB.transactions,vals.id),{date:o.date,category:o.category,amount:num(o.amount),mode:o.mode,note:o.note})); }
    else { DB.transactions.push({id:uid(),type,date:o.date||today(),category:o.category,amount:num(o.amount),mode:o.mode,note:o.note,createdAt:Date.now()}); audit(L((type==='income'?'आय':'खर्च')+' जोड़ा ','Added '+type+' ')+money(o.amount)); save(); render(); toast(L('जुड़ गया','Added'),{type:'good'}); }
    closeModal();
  });
}
function delTx(id){ withUndo(L('लेन-देन हटाया','Transaction deleted'),()=>{ DB.transactions=DB.transactions.filter(t=>t.id!==id); }); }
function setTxFilter(k,v){ state.txFilter=state.txFilter||{from:'',to:'',type:'all',q:''}; state.txFilter[k]=v; resetPage('income'); render(); }
function quickTxRange(p){
  const t=today();
  state.txFilter=state.txFilter||{from:'',to:'',type:'all',q:''};
  if(p==='today'){ state.txFilter.from=t; state.txFilter.to=t; }
  else if(p==='week'){ const d=new Date(); d.setDate(d.getDate()-d.getDay()); state.txFilter.from=d.toISOString().slice(0,10); state.txFilter.to=t; }
  else { state.txFilter.from=t.slice(0,7)+'-01'; state.txFilter.to=t; }
  resetPage('income'); render();
}

    </div>
    <div class="toolbar">
      <input id="srch_income" class="search" placeholder="🔍 ${L('श्रेणी/नोट खोजें','Search category/note')}" value="${esc(f.q||'')}" oninput="setTxFilter('q',this.value)">
      <div class="grp"><span>${L('से','From')}</span><input type="date" style="width:auto;border:0;padding:4px" value="${f.from||''}" onchange="setTxFilter('from',this.value)">
      <span>${L('तक','To')}</span><input type="date" style="width:auto;border:0;padding:4px" value="${f.to||''}" onchange="setTxFilter('to',this.value)"></div>
      <div class="grp" style="gap:4px"><button class="btn ghost sm" style="padding:4px 8px" onclick="quickTxRange('today')">${L('आज','Today')}</button><button class="btn ghost sm" style="padding:4px 8px" onclick="quickTxRange('week')">${L('इस सप्ताह','This Week')}</button><button class="btn ghost sm" style="padding:4px 8px" onclick="quickTxRange('month')">${L('इस महीने','This Month')}</button></div>
      <select style="width:auto" onchange="setTxFilter('type',this.value)">
        <option value="all" ${f.type==='all'?'selected':''}>${L('सभी','All')}</option>
        <option value="income" ${f.type==='income'?'selected':''}>${L('केवल आय','Income only')}</option>
        <option value="expense" ${f.type==='expense'?'selected':''}>${L('केवल खर्च','Expense only')}</option>
      </select>
      <button class="btn ghost sm" onclick="state.txFilter=null;resetPage('income');render()">${L('रीसेट','Reset')}</button>
      <div class="spacer"></div>
      <span class="badge income">${L('आय','In')}: ${money(tin)}</span>
      <span class="badge expense">${L('खर्च','Out')}: ${money(tout)}</span>
      <span class="badge blue">${L('शेष','Net')}: ${money(tin-tout)}</span>
    </div>
    ${DB.transactions.length? paginatedTable('income',
      [L('तारीख़','Date'),L('प्रकार','Type'),L('श्रेणी','Category'),L('तरीका','Mode'),L('नोट','Note'),L('रकम','Amount'),''],
      rows.map(x=>[fmtDate(x.date),typeBadge(x.type),esc(x.category||'-'),modeLabel(x.mode),esc(x.note||''),
        {num:true,v:money(x.amount)},
        actBtns([['✏️',`addTx('${x.type}', findTx('${x.id}'))`,L('एडिट','Edit')],['🗑️',`delTx('${x.id}')`,L('हटाएँ','Delete')]])])
    ) : emptyHTML(L('अभी कोई लेन-देन नहीं।','No transactions yet.'))}
  `;
}

  {v:'gift',t:{hi:'दान (Gift)',en:'Gift Deed'}},

  {v:'will',t:{hi:'वसीयत (Will)',en:'Will'}},
  {v:'partition',t:{hi:'बंटवारा (Partition)',en:'Partition'}},

function deedLabel(v){ const d=DEED_TYPES.find(x=>x.v===v); return d?d.t[state.lang]:esc(v||'-'); }
function registryDue(r){ return Math.max(0, Number(r.serviceCharge||0)-Number(r.received||0)); }
function regPayStatus(r){ const due=registryDue(r); if(Number(r.serviceCharge)<=0) return 'na'; if(due<=0) return 'paid'; if(Number(r.received)>0) return 'part'; return 'unpaid'; }
function pendingRegistries(){ return DB.registryDocs.filter(r=>registryDue(r)>0); }
function pendingRegistriesUnlinked(){ return DB.registryDocs.filter(r=>registryDue(r)>0 && !r.linkToLedger); }
function nextDocNo(){ let mx=0; DB.registryDocs.forEach(r=>{ const m=String(r.docNo||'').match(/(\d+)\s*$/); if(m) mx=Math.max(mx,parseInt(m[1],10)); }); return 'REG-'+String(mx+1).padStart(4,'0'); }
function findDoc(id){ const d=byId(DB.registryDocs,id); return d?{...d}:{}; }
function setRegFilter(k,v){ state.regFilter=state.regFilter||{q:'',status:'all',deed:'all'}; state.regFilter[k]=v; resetPage('registry'); render(); }

        {num:true,v:registryDue(d)>0?`<span style="color:var(--danger);font-weight:700">${money(registryDue(d))}</span>`:money(0)},

function statusCell(d){
  const ps=regPayStatus(d);
  const st=d.status==='done'?`<span class="badge income">${L('पूर्ण','Done')}</span>`:`<span class="badge gray">${L('लंबित','Pending')}</span>`;
  const pay= ps==='paid'?`<span class="badge income">${L('पूरा','Paid')}</span>`: ps==='part'?`<span class="badge part">${L('आंशिक','Partial')}</span>`: ps==='unpaid'?`<span class="badge warn">${L('बकाया','Unpaid')}</span>`:'';
  return st+' '+pay;
}

    if(isEdit){ 
      const oldDoc=byId(DB.registryDocs,vals.id);
      const oldReceived=num(oldDoc.received), newReceived=num(rec.received);
      withUndo(L('दस्तावेज़ बदला','Document updated'),()=>{
        Object.assign(oldDoc,rec);
        // Auto-adjust ledger if linked and received changed
        if(rec.linkToLedger && rec.customerId && oldReceived!==newReceived){
          const diff=newReceived-oldReceived; // positive=more collected, negative=reduced
          if(diff!==0){
            const type=diff>0?'payment':'charge';
            const note=diff>0?L('रजिस्ट्री वसूली (एडिट)','Registry collection (edit)')+' '+rec.docNo : L('रजिस्ट्री वसूली कम (एडिट)','Registry collection reduced (edit)')+' '+rec.docNo;
            DB.ledgerEntries.push({id:uid(),customerId:rec.customerId,type,date:today(),amount:Math.abs(diff),note,createdAt:Date.now()});
          }
        }
      }); 
      closeModal(); 
    }
    else {
      rec.id=uid(); rec.createdAt=Date.now(); DB.registryDocs.push(rec); audit(L('दस्तावेज़ जोड़ा ','Added document ')+(rec.docNo||'')); save(); render(); closeModal();
      let linked=false;
      if(rec.linkToLedger && rec.customerId && num(rec.serviceCharge)>num(rec.received)){
        const due=num(rec.serviceCharge)-num(rec.received);
        DB.ledgerEntries.push({id:uid(),customerId:rec.customerId,type:'charge',date:rec.date,amount:due,note:L('रजिस्ट्री बकाया','Registry due')+' '+rec.docNo,createdAt:Date.now()});
        save(); render(); linked=true;
      }
      if(!linked && num(o.received)>0) offerRecordIncome(rec.id, num(o.received));
      else if(!linked) toast(L('दस्तावेज़ जुड़ गया','Document added'),{type:'good'});
      else toast(L('दस्तावेज़ जुड़ गया + उधार में बकाया दर्ज','Document added + due recorded in Udhar'),{type:'good'});
      /* Auto-create customer from party1 if not matched */
      const matched=DB.customers.find(c=>c.name.toLowerCase().trim()===o.party1.toLowerCase().trim());
      if(!matched && o.party1.trim() && o.applicantPhone.trim() && !isEdit){
        openModal(`<h3>👤 ${L('ग्राहक बनाएँ?','Create customer?')}</h3>
          <div class="body" style="line-height:1.6">${L('"'+esc(o.party1)+'" अभी तक ग्राहक नहीं है। उधार खाते में जोड़ें?','"'+esc(o.party1)+'" is not a customer yet. Add to Udhar ledger?')}</div>
          <div class="foot"><button class="btn ghost" onclick="closeModal();">${L('नहीं','No')}</button>
          <button class="btn green" onclick="quickAddCustomer('${esc(o.party1)}','${esc(o.applicantPhone)}','${esc(o.property)}')">${L('हाँ, ग्राहक बनाएँ','Yes, create customer')}</button></div>`);
      }
    }
  },{wide:true});
}

function collectReg(id){
  const d=byId(DB.registryDocs,id); if(!d)return; const due=registryDue(d);
  const partyOpts=[{v:'general',t:L('सामान्य','General')},{v:'party1',t:L('पक्षकार 1: ','Party 1: ')+(d.party1||L('नाम नहीं','No name'))},{v:'party2',t:L('पक्षकार 2: ','Party 2: ')+(d.party2||L('नाम नहीं','No name'))}];
  formModal(L('सेवा-शुल्क वसूली','Collect Service Fee')+' — '+esc(d.docNo||''),[
    {key:'amount',label:L('अभी कितना मिला','Amount received now'),type:'number',required:true,value:due>0?due:'',help:L('बकाया','Due')+': '+money(due)},
    {key:'recoverFrom',label:L('किस पक्षकार से वसूली','Recover from which party'),type:'select',options:partyOpts,value:'general',half:true},
    {key:'addToLedger',label:L('उधार खाते में जोड़ें?','Add to Udhar Ledger?'),type:'select',options:[{v:'auto',t:L('ऑटो (पहले से जुड़ा है तो)','Auto (if already linked)')},{v:'yes',t:L('हाँ, जोड़ दें','Yes, add it')},{v:'no',t:L('नहीं','No')}],value:'auto',half:true},
    {key:'mode',label:L('तरीका','Mode'),type:'select',options:MODE_OPTS(),value:'cash'},
    {key:'asIncome',label:L('इसे आज की आय में जोड़ें?','Add this to today\'s income?'),type:'select',options:[{v:'yes',t:L('हाँ (सुझाव)','Yes (recommended)')},{v:'no',t:L('नहीं','No')}],value:'yes'},
  ],{},o=>{
    const amt=num(o.amount);
    if(amt<=0){ toast(L('रकम 0 से ज़्यादा होनी चाहिए','Amount must be > 0'),{type:'bad'}); return; }
    if(amt>due+0.01){ toast(L('रकम बकाया से ज़्यादा नहीं हो सकती','Amount cannot exceed due'),{type:'bad'}); return; }
    const shouldLinkToLedger=o.addToLedger==='yes' || (o.addToLedger==='auto' && d.linkToLedger && d.customerId);
    const targetCustomerId=shouldLinkToLedger?(d.customerId||''):'';
    withUndo(L('वसूली दर्ज','Payment recorded'),()=>{
      d.received=num(d.received)+amt;
      if(o.asIncome==='yes') DB.transactions.push({id:uid(),type:'income',date:today(),category:L('रजिस्ट्री फ़ीस','Registry Fee'),amount:amt,mode:o.mode,note:(d.docNo||'')+' '+(d.party1||''),createdAt:Date.now()});
      if(shouldLinkToLedger && targetCustomerId){
        const partyLabel=o.recoverFrom==='party1'?(d.party1||''):o.recoverFrom==='party2'?(d.party2||''):'';
        const note=L('रजिस्ट्री वसूली','Registry collection')+' '+d.docNo+(partyLabel?' ('+partyLabel+')':'');
        DB.ledgerEntries.push({id:uid(),customerId:targetCustomerId,type:'payment',date:today(),amount:amt,note,createdAt:Date.now()});
      }
    });
    closeModal(); toast(L('वसूली दर्ज','Payment recorded'),{type:'good'});
  });
}

function customerBalance(cid){
  const ck='c'+cid; if(_balCache[ck]!=null) return _balCache[ck];
  const v=DB.ledgerEntries.filter(e=>e.customerId===cid).reduce((s,e)=>s+(e.type==='charge'?Number(e.amount||0):-Number(e.amount||0)),0);
  return _balCache[ck]=v;
}

function addCustomer(vals){
  const isEdit=vals&&vals.id;
  formModal(vals&&vals.id?L('ग्राहक एडिट','Edit Customer'):L('नया ग्राहक','New Customer'),[
    {key:'name',label:L('नाम','Name'),type:'text',required:true},
    {key:'phone',label:L('फ़ोन','Phone'),type:'tel',help:L('10 अंकों का भारतीय नंबर','10-digit Indian number')},
    {key:'address',label:L('पता','Address'),type:'textarea'},
    {key:'followUpDate',label:L('अगला फॉलो-अप','Next Follow-up'),type:'date',half:true,help:L('बकाया वसूली के लिए','For due collection')},
  ],vals||{},async o=>{
    if(!validatePhone(o.phone) && o.phone.trim()){ setErr('phone',L('10 अंकों का सही मोबाइल नंबर डालें (जैसे 9876543210)','Enter a valid 10-digit mobile number')); return; }
    if(vals&&vals.id){ withUndo(L('ग्राहक बदला','Customer updated'),()=>Object.assign(byId(DB.customers,vals.id),{name:o.name,phone:o.phone,address:o.address,followUpDate:o.followUpDate||''})); }
    else {

function importBankFile(aid){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.csv,.xlsx,.xls,text/csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel';
  inp.onchange=()=>{ const file=inp.files[0]; if(!file)return;
    const ext=(file.name.split('.').pop()||'').toLowerCase();
    if(ext==='xlsx'||ext==='xls'){
      loadXLSX().then(()=>{
        const r=new FileReader();
        r.onload=(e)=>{
          try{
            const data=new Uint8Array(e.target.result);
            const wb=XLSX.read(data,{type:'array'});
            const ws=wb.Sheets[wb.SheetNames[0]];
            const json=XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false});
            if(json.length<2){ toast(L('फ़ाइल में डेटा नहीं मिला।','No data found.'),{type:'bad'}); return; }
            showCSVMapper(aid,json.map(r=>r.map(c=>c==null?'':String(c))));
          }catch(err){ toast(L('Excel पढ़ने में गड़बड़ी। इंटरनेट चालू है?','Error reading Excel. Is internet on?'),{type:'bad'}); }
        };
        r.readAsArrayBuffer(file);
      }).catch(()=>toast(L('Excel लाइब्रेरी लोड नहीं हुई। इंटरनेट चालू करें।','Could not load Excel library. Enable internet.'),{type:'bad'}));
    } else {
      const r=new FileReader();
      r.onload=()=>{ const rows=parseCSV(r.result); if(rows.length<2){ toast(L('फ़ाइल में डेटा नहीं मिला।','No data found.'),{type:'bad'}); return; } showCSVMapper(aid,rows); };
      r.readAsText(file);
    }
  };
  inp.click();
}

      <label class="fld"><span class="lt">${L('तारीख़','Date')}</span>${sel('date',guess(['date','txn','tran','value date']))}</label>
      <label class="fld"><span class="lt">${L('विवरण','Description')}</span>${sel('desc',guess(['desc','narration','particular','remark','detail','transaction remarks']))}</label>
      <label class="fld"><span class="lt">${L('नामे (Debit/Withdrawal)','Debit / Withdrawal')}</span>${sel('debit',guess(['debit','withdraw','dr','debit amount']))}</label>
      <label class="fld"><span class="lt">${L('जमा (Credit/Deposit)','Credit / Deposit')}</span>${sel('credit',guess(['credit','deposit','cr','credit amount']))}</label>
      <div class="hint">${L('पहली पंक्ति को हेडर माना गया है।','First row treated as header.')}</div>
    </div>
    <div class="foot">
      <button class="btn ghost" onclick="closeModal()">${L('रद्द','Cancel')}</button>
      <button class="btn" onclick="doCSVImport('${aid}')">${L('इम्पोर्ट करें','Import')}</button>
    </div>`);
  showCSVMapper._rows=rows;
}
function doCSVImport(aid){
  const rows=showCSVMapper._rows; const g=id=>document.getElementById('map_'+id).value;
  const ci={date:g('date'),desc:g('desc'),debit:g('debit'),credit:g('credit')};
  if(ci.date===''){ toast(L('तारीख़ का कॉलम चुनें।','Select the Date column.'),{type:'warn'}); return; }
  /* signature of existing rows so re-importing the same statement doesn't double-count */
  const seen=new Set(DB.bankTransactions.filter(t=>t.accountId===aid).map(t=>[t.date,num(t.debit),num(t.credit),(t.description||'').trim()].join('|')));
  let n=0,dup=0,bad=0;
  for(let i=1;i<rows.length;i++){ const row=rows[i]; if(!row||row.every(c=>!c))continue;
    const dt=parseAnyDate(row[ci.date]); if(!dt){ bad++; continue; }
    const debit=ci.debit!==''?num(row[ci.debit]):0,credit=ci.credit!==''?num(row[ci.credit]):0;
    if(!debit&&!credit)continue;
    const desc=ci.desc!==''?row[ci.desc]:'';
    const sig=[dt,debit,credit,(desc||'').trim()].join('|');
    if(seen.has(sig)){ dup++; continue; }
    seen.add(sig);
    DB.bankTransactions.push({id:uid(),accountId:aid,date:dt,description:desc,debit,credit}); n++;
  }
  save(); closeModal(); render();
  let msg=L(n+' लेन-देन इम्पोर्ट हुए।',n+' transactions imported.');
  if(dup) msg+=L(' '+dup+' डुप्लिकेट छोड़े।',' '+dup+' duplicates skipped.');
  if(bad) msg+=L(' '+bad+' पंक्ति की तारीख़ ग़लत थी।',' '+bad+' rows had bad dates.');
  toast(msg,{type:n?'good':'warn',duration:5500});
}
function parseCSV(text){
  const rows=[]; let i=0,field='',row=[],inQ=false;
  while(i<text.length){ const c=text[i];
    if(inQ){ if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else inQ=false; } else field+=c; }
    else { if(c==='"')inQ=true; else if(c===','){row.push(field);field='';} else if(c==='\n'){row.push(field);rows.push(row);row=[];field='';} else if(c==='\r'){} else field+=c; }
    i++; }
  if(field.length||row.length){ row.push(field); rows.push(row); }
  return rows.map(r=>r.map(c=>c.trim())).filter(r=>r.some(x=>x!==''));
}
const MONTHS={jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
function validDate(y,mo,d){ y=+y;mo=+mo;d=+d; return mo>=1&&mo<=12&&d>=1&&d<=31&&y>=1900&&y<=2200; }
function parseAnyDate(s){ if(!s)return''; s=String(s).trim();
  let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/); if(m){ return validDate(m[1],m[2],m[3])?`${m[1]}-${m[2]}-${m[3]}`:''; }
  m=s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/);
  if(m){ let y=m[3]; if(y.length===2)y='20'+y; const mo=m[2].padStart(2,'0'),d=m[1].padStart(2,'0'); return validDate(y,mo,d)?`${y}-${mo}-${d}`:''; }
  m=s.match(/^(\d{1,2})[\s\-]([A-Za-z]{3})[A-Za-z]*[\s\-](\d{2,4})/);
  if(m){ const mo=MONTHS[m[2].toLowerCase()]; if(mo){ let y=m[3]; if(y.length===2)y='20'+y; const d=m[1].padStart(2,'0'); return validDate(y,mo,d)?`${y}-${mo}-${d}`:''; } }
  return '';
}

function setRep(k,v){ state.repRange=state.repRange||{from:curMonth()+'-01',to:today()}; state.repRange[k]=v; render(); }
function quickRange(p){ const y=today().slice(0,4);
  if(p==='today') state.repRange={from:today(),to:today()};
  else if(p==='month') state.repRange={from:curMonth()+'-01',to:today()};
  else state.repRange={from:y+'-01-01',to:today()};
  render(); }
function exportReportCSV(){
  const r=state.repRange||{from:curMonth()+'-01',to:today()};
  const tx=DB.transactions.filter(x=>x.date>=r.from&&x.date<=r.to).sort((a,b)=>a.date.localeCompare(b.date));
  let csv='Date,Type,Category,Mode,Note,Amount\n';
  tx.forEach(x=>{ csv+=[x.date,x.type,csvCell(x.category),x.mode,csvCell(x.note),x.amount].join(',')+'\n'; });
  downloadFile(`report_${r.from}_${r.to}.csv`,csv,'text/csv'); toast(L('CSV डाउनलोड हुई','CSV downloaded'),{type:'good'});
}
function csvCell(s){ s=String(s==null?'':s); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
/* Excel (.xls) — Excel opens HTML tables cleanly; multiple sections with real numbers */
function exportExcel(){
  const r=state.repRange||{from:curMonth()+'-01',to:today()};
  const inR=x=>x.date>=r.from&&x.date<=r.to;
  const tbl=(title,head,rows)=>`<h3>${esc(title)}</h3><table border="1"><tr>${head.map(h=>`<th>${esc(h)}</th>`).join('')}</tr>${rows.map(rw=>`<tr>${rw.map(c=>`<td>${typeof c==='number'?c:esc(c)}</td>`).join('')}</tr>`).join('')}</table><br>`;
  const tx=DB.transactions.filter(inR).sort((a,b)=>a.date.localeCompare(b.date));
  let html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"></head><body>`;
  html+=`<h2>${esc(DB.settings.shopName||'Registry Shop')}</h2><div>${L('अवधि','Period')}: ${fmtDate(r.from)} — ${fmtDate(r.to)}</div><br>`;
  html+=tbl(L('आय-खर्च','Income / Expense'),['Date','Type','Category','Mode','Note','Amount'],
    tx.map(x=>[x.date,x.type,x.category||'',x.mode||'',x.note||'',Number(x.amount)]));
  html+=tbl(L('रजिस्ट्री','Registry'),['DocNo','Date','Deed','Party1','Party2','Property','Stamp','RegFee','ServiceFee','Received','Due','Status'],
    DB.registryDocs.filter(inR).map(d=>[d.docNo||'',d.date,d.deedType||'',d.party1||'',d.party2||'',d.property||'',Number(d.stampDuty),Number(d.regFee),Number(d.serviceCharge),Number(d.received),registryDue(d),d.status||'']));
  html+=tbl(L('उधार बकाया','Udhaar Outstanding'),['Customer','Phone','Balance'],
    outstandingCustomers().map(x=>[x.c.name,x.c.phone||'',x.bal]));
  html+=`</body></html>`;
  downloadFile(`registry-export_${r.from}_${r.to}.xls`,html,'application/vnd.ms-excel');
  toast(L('Excel फ़ाइल डाउनलोड हुई','Excel file downloaded'),{type:'good'});
}

      <tr><td>UPI</td><td style="text-align:right">${money(upi.in)}</td><td style="text-align:right">${money(upi.out)}</td></tr>

function backupOverdueDays(){
  const lb=DB.settings.lastBackup;
  const hasData=DB.transactions.length||DB.registryDocs.length||DB.customers.length;
  if(!hasData) return null;
  if(!lb) return 0;
  const dd=daysBetween(lb.slice(0,10),today());
  return dd>=7?dd:null;
}

function saveSyncKey(){
  const el=document.getElementById('setSyncKey'); const key=el?el.value.trim():'';
  if(key && key.length<SYNC_MIN_LEGACY_LENGTH){ toast(L('शॉप की कम-से-कम 4 अक्षर की हो।','Shop Key must be at least 4 characters.'),{type:'bad'}); return; }
  if(key && key.length<SYNC_MIN_KEY_LENGTH){ toast(L('ध्यान दें: छोटी की सिर्फ़ पहले से बनी दुकान के लिए चलेगी। नई दुकान के लिए 16+ अक्षर की की रखें।','Note: a short key only works for an already-existing shop. Use a 16+ character key for a new shop.'),{type:'warn'}); }
  const changed = key!==(DB.settings.syncKey||'');
  DB.settings.syncKey=key;
  if(changed){ saveSyncBase(null); DB.settings.syncRev=0; }   /* new shop → forget old base */
  save();
  if(syncOn()){ startSync(); toast(L('की सेव हुई — सिंक चालू।','Key saved — sync is on.'),{type:'good'}); }
  else { stopSync(); render(); toast(L('की सेव हुई।','Key saved.'),{type:'good'}); }
}
function toggleSync(on){

  save();
  if(syncOn()){ startSync(); toast(L('मल्टी-डिवाइस सिंक चालू।','Multi-device sync on.'),{type:'good'}); }
  else if(on){ render(); toast(L('पहले एक शॉप की डालें (नई दुकान के लिए कम-से-कम 16 अक्षर)।','Enter a Shop Key first (at least 16 characters for a new shop).'),{type:'warn'}); }

/* ---------- pagination (keeps the UI fast at 1000-2000+ records) ----------
   Big lists (registry docs, daily income/expense) only render one page of rows
   into the DOM at a time. Filtering/sorting still runs over the full dataset;
   only the slice that is shown is built into HTML. */
const PAGE_SIZE=50;
const _page={};                      /* per-view current page index (0-based) */
function getPage(key,total){
  let p=_page[key]||0;
  const last=Math.max(0,Math.ceil(total/PAGE_SIZE)-1);
  if(p>last) p=last; if(p<0) p=0;
  _page[key]=p; return p;
}
function setPage(key,p){ _page[key]=p; render(); }
function resetPage(key){ _page[key]=0; }
/* paginatedTable: rows already filtered+sorted. Renders the active page plus a pager. */
function paginatedTable(key,cols,allRows){
  const total=allRows.length;
  if(!total) return emptyHTML(L('इस फ़िल्टर में कोई रिकॉर्ड नहीं।','No records for this filter.'));
  const p=getPage(key,total);
  const start=p*PAGE_SIZE, end=Math.min(total,start+PAGE_SIZE);
  const slice=allRows.slice(start,end);
  let pager='';
  if(total>PAGE_SIZE){
    const last=Math.ceil(total/PAGE_SIZE)-1;
    pager=`<div class="pager">
      <span class="info">${L('दिखा रहे हैं','Showing')} ${start+1}–${end} ${L('में से','of')} ${total}</span>
      <div class="spacer"></div>
      <button class="btn ghost sm" ${p<=0?'disabled':''} onclick="setPage('${key}',0)">⏮ ${L('पहला','First')}</button>
      <button class="btn ghost sm" ${p<=0?'disabled':''} onclick="setPage('${key}',${p-1})">‹ ${L('पिछला','Prev')}</button>
      <span class="info">${L('पृष्ठ','Page')} ${p+1}/${last+1}</span>
      <button class="btn ghost sm" ${p>=last?'disabled':''} onclick="setPage('${key}',${p+1})">${L('अगला','Next')} ›</button>
      <button class="btn ghost sm" ${p>=last?'disabled':''} onclick="setPage('${key}',${last})">${L('आख़िरी','Last')} ⏭</button>
    </div>`;
  }
  return tableHTML(cols,slice)+pager;
}

document.addEventListener('keydown',e=>{
  if(e.repeat) return;
  const open=document.getElementById('modalBg').classList.contains('show');
  if((e.ctrlKey||e.metaKey) && e.key==='z' && !e.shiftKey){ e.preventDefault(); undo(); return; }
  if((e.ctrlKey||e.metaKey) && e.key==='z' && e.shiftKey){ e.preventDefault(); redo(); return; }
  if((e.ctrlKey||e.metaKey) && e.key==='y'){ e.preventDefault(); redo(); return; }
  if(e.key==='Escape' && open){ closeModal(); }

    const btn=[...document.querySelectorAll('#modalBox .foot .btn')].find(b=>!b.classList.contains('ghost'));
    if(btn){ e.preventDefault(); btn.click(); }

  else if(!open && (e.key==='Enter'||e.key===' ') && e.target.closest && e.target.closest('nav.side a')){ e.preventDefault(); e.target.click(); }
});

let _dirHandle=null; /* File System Access directory handle (if granted) */
async function pickBackupFolder(){
  if(!window.showDirectoryPicker){ toast(L('यह ब्राउज़र फ़ोल्डर-बैकअप सपोर्ट नहीं करता (Chrome/Edge इस्तेमाल करें)। रोज़ाना फ़ाइल-डाउनलोड चालू है।','This browser does not support folder backup (use Chrome/Edge). Daily file-download is on.'),{type:'warn'}); return; }
  try{
    const h=await window.showDirectoryPicker({mode:'readwrite'});
    _dirHandle=h; await idbSetHandle(h);
    DB.settings.backupFolderName=h.name; save(); render();
    toast(L('बैकअप फ़ोल्डर सेट हो गया: '+h.name,'Backup folder set: '+h.name),{type:'good'});
    writeFolderBackup();

async function idbSetHandle(h){ try{ const db=await idbOpen(); const tx=db.transaction(IDB_STORE,'readwrite'); tx.objectStore(IDB_STORE).put(h,'dirHandle'); }catch(e){} }
async function idbGetHandle(){ try{ const db=await idbOpen(); return await new Promise(res=>{ const rq=db.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get('dirHandle'); rq.onsuccess=()=>res(rq.result); rq.onerror=()=>res(null); }); }catch(e){ return null; } }
async function writeFolderBackup(){
  if(!_dirHandle) return false;
  try{
    if(_dirHandle.queryPermission){ const p=await _dirHandle.queryPermission({mode:'readwrite'});
      if(p!=='granted'){ const r=await _dirHandle.requestPermission({mode:'readwrite'}); if(r!=='granted') return false; } }
    const fh=await _dirHandle.getFileHandle('registry-shop-backup-'+today()+'.json',{create:true});
    const w=await fh.createWritable(); await w.write(JSON.stringify(DB,null,2)); await w.close();
    DB.settings.lastAutoBackup=nowStamp(); DB.settings.lastBackup=nowStamp();
    try{ localStorage.setItem(KEY,JSON.stringify(DB)); }catch(e){}
    return true;
  }catch(e){ return false; }
}
/* called after every save(): once a day, secure a backup automatically */
let _autoBkBusy=false;
async function maybeAutoBackup(){
  if(_autoBkBusy || !DB.settings.autoBackupDaily) return;
  const last=(DB.settings.lastAutoBackup||'').slice(0,10);

async function pbkdf2Hash(passcode){
  try{
    var salt=crypto.getRandomValues(new Uint8Array(16));
    var key=await crypto.subtle.importKey('raw',new TextEncoder().encode(passcode),{name:'PBKDF2'},false,['deriveBits']);
    var hash=await crypto.subtle.deriveBits({name:'PBKDF2',salt:salt,iterations:100000,hash:'SHA-256'},key,256);
    var out=new Uint8Array(48); out.set(salt,0); out.set(new Uint8Array(hash),16);
    return btoa(String.fromCharCode.apply(null,out));
  }catch(e){ return 'plain:'+passcode; }
}
async function verifyPbkdf2(passcode,storedHash){
  try{
    if(storedHash.startsWith('plain:')) return passcode===storedHash.slice(6);
    var raw=Uint8Array.from(atob(storedHash),function(c){return c.charCodeAt(0);});
    if(raw.length!==48) return false;
    var salt=raw.slice(0,16), expected=raw.slice(16);
    var key=await crypto.subtle.importKey('raw',new TextEncoder().encode(passcode),{name:'PBKDF2'},false,['deriveBits']);
    var hash=await crypto.subtle.deriveBits({name:'PBKDF2',salt:salt,iterations:100000,hash:'SHA-256'},key,256);
    var actual=new Uint8Array(hash);
    if(actual.length!==expected.length) return false;
    var diff=0; for(var i=0;i<actual.length;i++) diff|=actual[i]^expected[i];
    return diff===0;
  }catch(e){ return false; }
}

/* ============================================================
   Multi-device sync engine (client side).
   Pushes after every save (debounced), polls every ~7s, and merges
   with merge3() so PC + phone stay in sync. All network is best-effort:
   if offline the app keeps working locally and reconciles on reconnect.

   E2E encryption: the document is encrypted client-side with the sync key
   before leaving the device; the server stores only opaque ciphertext and
   the merge3 reconciliation also runs client-side. The server is a dumb
   CAS (content-addressable store) that never sees plaintext data.
   ============================================================ */
const SYNC_ENDPOINT='/.netlify/functions/sync';
const SYNC_BASE_KEY='registry_shop_app_v1_syncbase';
let _syncBase=null, _syncPushTimer=null, _syncPollTimer=null, _syncBusy=false, _syncPushPending=false;

/* ---- E2E encryption helpers (Web Crypto API) ---- */
async function syncDeriveKey(passphrase, salt){
  const enc=new TextEncoder();
  const keyMaterial=await crypto.subtle.importKey('raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name:'PBKDF2', salt, iterations:600000, hash:'SHA-256' },
    keyMaterial, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']);
}
async function syncEncrypt(plainObj, passphrase){
  const salt=crypto.getRandomValues(new Uint8Array(16));
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const key=await syncDeriveKey(passphrase, salt);
  const enc=new TextEncoder();
  const ct=new Uint8Array(await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(JSON.stringify(plainObj))));
  const out=new Uint8Array(salt.length+iv.length+ct.length);
  out.set(salt,0); out.set(iv,16); out.set(ct,28);
  
  let bin = '';
  const len = out.byteLength;
  const chunkSize = 8192;
  for (let i = 0; i < len; i += chunkSize) {
    bin += String.fromCharCode.apply(null, out.subarray(i, i + chunkSize));
  }
  return btoa(bin);
}
async function syncDecrypt(encB64, passphrase){
  try{
    const raw=Uint8Array.from(atob(encB64), c=>c.charCodeAt(0));
    const salt=raw.slice(0,16); const iv=raw.slice(16,28); const ct=raw.slice(28);
    const key=await syncDeriveKey(passphrase, salt);
    const pt=await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ct);
    return JSON.parse(new TextDecoder().decode(pt));
  }catch(e){ return null; }
}
/* run after any sync op: free the busy lock and, if a push was requested while
   busy (e.g. a save fired during a poll), flush it now so local edits aren't
   stranded until the next save. */
function _afterSyncOp(){
  _syncBusy=false;
  if(_syncPushPending){ _syncPushPending=false; syncSchedulePush(); }
}
function _clone(o){ return o?JSON.parse(JSON.stringify(o)):o; }
/* settings that belong to THIS device and must never travel between devices:
   sync internals, the passcode secret, plus per-device backup bookkeeping.
   Syncing them corrupts the backup reminder (one device's backup silences the
   other's) and leaks the secret sync key / passcode into the shared blob. */
const DEVICE_LOCAL_SETTINGS=['syncEnabled','syncKey','syncRev','lastSyncAt',
  'lastBackup','lastAutoBackup','backupFolderName','passcode','passcodeHash'];
/* a copy of DB safe to send/merge: device-local settings stripped out. */
function syncableDoc(src){
  const d=_clone(src);
  if(d&&d.settings){ DEVICE_LOCAL_SETTINGS.forEach(k=>{ delete d.settings[k]; }); }
  return d;
}
function loadSyncBase(){ try{ _syncBase=JSON.parse(localStorage.getItem(SYNC_BASE_KEY)||'null'); }catch(e){ _syncBase=null; } }
function saveSyncBase(obj){ _syncBase=_clone(obj); try{ localStorage.setItem(SYNC_BASE_KEY, JSON.stringify(_syncBase)); }catch(e){} }
/* must match netlify/functions/sync.mjs: 16 for NEW keys, 4 floor for existing
   (grandfathered) keys. The client lets any >=4 key drive sync; the server
   rejects brand-new short keys, so existing short-key shops keep working. */
const SYNC_MIN_KEY_LENGTH=16;
const SYNC_MIN_LEGACY_LENGTH=4;
function syncOn(){ return !!(DB.settings.syncEnabled && DB.settings.syncKey && String(DB.settings.syncKey).trim().length>=SYNC_MIN_LEGACY_LENGTH); }
function setSyncChip(stateName){
  const c=document.getElementById('syncChip'); if(!c) return;
  if(!syncOn()){ c.style.display='none'; return; }
  c.style.display='';
  const map={ ok:['✓ सिंक','✓ synced','#1a7f37'], busy:['⏳ सिंक…','⏳ syncing…','#9a6700'],
    off:['⚠ ऑफ़लाइन','⚠ offline','#b35900'], err:['⚠ सिंक रुका','⚠ sync paused','#cf222e'] };
  const m=map[stateName]||map.ok;
  c.textContent=L(m[0],m[1]); c.style.color=m[2]; c.style.opacity='1';
}
/* save DB locally WITHOUT triggering another sync push (avoids a push loop) */
function persistQuiet(){
  const json=JSON.stringify(DB);
  try{ localStorage.setItem(KEY, json); }catch(e){}
  idbSet(json).catch(()=>{});
}
/* apply a merged document received from / reconciled with the server.
   serverDoc is what the server actually holds at this rev; it becomes the new
   merge ancestor (base). The base MUST track the server's copy, not the merged
   local DB — otherwise local-only records (in base+mine, absent on server) are
   read as deletions on the next push and silently dropped. */
function applyMerged(merged, rev, serverDoc){
  const modalOpen=(()=>{ const e=document.getElementById('modalBg'); return e&&e.classList.contains('show'); })();
  if(modalOpen) return false;                 /* don't yank data out from under an open form; retry next poll */
  /* the merged doc carries no device-local settings — keep this device's own. */
  const localSettings={}; DEVICE_LOCAL_SETTINGS.forEach(k=>{ localSettings[k]=DB.settings[k]; });
  replaceDB(merged);
  Object.assign(DB.settings, localSettings);
  DB.settings.syncRev=rev;
  DB.settings.lastSyncAt=nowStamp();
  saveSyncBase(serverDoc!==undefined ? serverDoc : merged);
  state.lang=DB.settings.lang||state.lang;
  persistQuiet();
  captureFocus(); applyStaticI18n(); render(); restoreFocus();
  return true;
}
async function _req(method, body){
  const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(), 12000);
  try{
    const res=await fetch(SYNC_ENDPOINT, { method,
      headers:{ 'content-type':'application/json', 'x-shop-key':DB.settings.syncKey },
      body: body?JSON.stringify(body):undefined, signal:ctrl.signal });
    if(!res.ok){ return { _err:res.status }; }
    return await res.json();
  }catch(e){ return { _err:'network' }; }
  finally{ clearTimeout(t); }
}
async function syncPush(){
  if(!syncOn()) return;
  if(_syncBusy){ _syncPushPending=true; return; }
  _syncBusy=true; setSyncChip('busy');
  try{
    const pushed=syncableDoc(DB);
    const encrypted=await syncEncrypt(pushed, DB.settings.syncKey);
    const resp=await _req('POST', { rev:DB.settings.syncRev||0, data:encrypted });
    if(resp && resp._err){
      setSyncChip(resp._err==='network'?'off':'err');
      if(resp._err===403) toast(L('यह शॉप की बहुत छोटी है। नई दुकान के लिए 16+ अक्षर की की रखें।','This Shop Key is too short. Use a 16+ character key for a new shop.'),{type:'bad',sticky:true});
      if(resp._err===413) toast(L('डेटा बहुत बड़ा है — सिंक नहीं हो सका। कृपया बैकअप लें और पुराना डेटा कम करें।','Data too large to sync. Please back up and trim old data.'),{type:'bad',sticky:true});
      return;
    }
    if(resp && resp.conflict && resp.data){
      const serverDoc=await syncDecrypt(resp.data, DB.settings.syncKey);
      if(serverDoc){
        const merged=merge3(_syncBase, serverDoc, syncableDoc(DB));
        const hadConcurrentEdits=!_eq(merged, serverDoc);
        applyMerged(merged, resp.rev, serverDoc);
        if(hadConcurrentEdits) syncSchedulePush();
      }
    } else if(resp && resp.rev != null){
      DB.settings.syncRev=resp.rev;
      DB.settings.lastSyncAt=nowStamp();
      saveSyncBase(pushed);
      persistQuiet();
    }
    setSyncChip('ok');
  }catch(e){ setSyncChip('err'); }
  finally { _afterSyncOp(); }
}
async function syncPull(){
  if(!syncOn() || _syncBusy) return;
  _syncBusy=true;
  try{
    const resp=await _req('GET');
    if(resp && resp._err){ setSyncChip(resp._err==='network'?'off':'err'); return; }
    if(!resp){ return; }
    if(resp.data==null){
      setSyncChip('ok'); _syncPushPending=true; return;
    }
    if((resp.rev||0) > (DB.settings.syncRev||0)){
      const serverDoc=await syncDecrypt(resp.data, DB.settings.syncKey);
      if(serverDoc){
        const merged=merge3(_syncBase, serverDoc, syncableDoc(DB));
        applyMerged(merged, resp.rev, serverDoc);
      }
    }
    setSyncChip('ok');
  }catch(e){ setSyncChip('err'); }
  finally { _afterSyncOp(); }
}
/* THIS defines the placeholder hook called from save() */
function syncSchedulePush(){
  if(!syncOn()) return;
  clearTimeout(_syncPushTimer);
  _syncPushTimer=setTimeout(()=>{ syncPush(); }, 1500);
}
function syncNow(){ if(!syncOn()) return; syncPull().then(()=>syncPush()); }
function startSync(){
  if(!syncOn()){ stopSync(); return; }
  clearInterval(_syncPollTimer);
  _syncPollTimer=setInterval(()=>{ if(document.visibilityState!=='hidden') syncPull(); }, 7000);
  setSyncChip('ok');
  syncNow();
}
function stopSync(){ clearInterval(_syncPollTimer); _syncPollTimer=null; setSyncChip('ok'); }
window.addEventListener('online', ()=>{ if(syncOn()) syncNow(); });
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible' && syncOn()) syncPull(); });

/* recover from IndexedDB if it holds data and localStorage was cleared/older */
(async function bootstrap(){
  try{
    const idbJson=await idbGet();
    if(idbJson){
      const idbObj=JSON.parse(idbJson);
      const idbAt=(idbObj.meta&&idbObj.meta.savedAt)||'';
      const curAt=(DB.meta&&DB.meta.savedAt)||'';
      const curEmpty=!(DB.transactions.length||DB.registryDocs.length||DB.customers.length);
      if((curEmpty && (idbObj.transactions||[]).length+(idbObj.registryDocs||[]).length>0) || idbAt>curAt){
        replaceDB(idbObj); state.lang=DB.settings.lang||'hi';
        try{ localStorage.setItem(KEY,JSON.stringify(DB)); }catch(e){}
        applyTheme(); applyStaticI18n(); render();
        if(curEmpty) toast(L('🛟 आपका डेटा सुरक्षित डेटाबेस से वापस आ गया।','🛟 Your data was recovered from the durable database.'),{type:'good',duration:5000});
      }
    }
  }catch(e){}
  /* restore previously-granted backup folder handle */
  try{ const h=await idbGetHandle(); if(h){ _dirHandle=h; } }catch(e){}
  /* re-lock in case IndexedDB recovery brought in a passcode */
  lockScreen();
  /* first-time user with no data → friendly welcome wizard */
  if(!DB.settings.onboarded && !DB.settings.shopName && !(DB.transactions.length||DB.registryDocs.length||DB.customers.length) && !DB.settings.passcodeHash && !DB.settings.passcode){
    welcomeWizard();
  }
  /* multi-device sync: start polling if it was enabled on this device */
  try{ if(syncOn()) startSync(); else setSyncChip('ok'); }catch(e){}
})();

function subtractReg(id){
  const d=byId(DB.registryDocs,id); if(!d)return; const rec=num(d.received);
  if(rec<=0){ toast(L('वसूली हुई रकम 0 है — घटाने को कुछ नहीं','No collection to subtract'),{type:'bad'}); return; }
  const partyOpts=[{v:'general',t:L('सामान्य','General')},{v:'party1',t:L('पक्षकार 1: ','Party 1: ')+(d.party1||L('नाम नहीं','No name'))},{v:'party2',t:L('पक्षकार 2: ','Party 2: ')+(d.party2||L('नाम नहीं','No name'))}];
  formModal(L('वसूली घटाएँ/रिफंड','Reduce/Refund Collection')+' — '+esc(d.docNo||''),[
    {type:'info',label:L('<b>ध्यान दें:</b> यहाँ रकम घटाने से उधार खाता में <b>बकाया बढ़ जाएगा</b> (ऑटो जोड़ दिया जाएगा)।','<b>Note:</b> Subtracting here will <b>increase due</b> in Udhar ledger (auto-added).')},
    {key:'amount',label:L('कितना घटाना/वापस करना है','Amount to subtract/refund'),type:'number',required:true,value:rec,help:L('अब तक मिला','Received so far')+': '+money(rec)},
    {key:'subtractFrom',label:L('किस पक्षकार का पैसा घटाएँ','Subtract from which party'),type:'select',options:partyOpts,value:'general',half:true},
    {key:'subFromLedger',label:L('उधार खाते से भी घटाएँ?','Also subtract from Udhar Ledger?'),type:'select',options:[{v:'auto',t:L('ऑटो (जुड़ा है तो)','Auto (if linked)')},{v:'yes',t:L('हाँ','Yes')},{v:'no',t:L('नहीं','No')}],value:'auto',half:true},
    {key:'reason',label:L('कारण','Reason'),type:'text',placeholder:L('जैसे: गलती से ज़्यादा लिया, रिफंड','e.g. overcharged, refund')},
  ],{},o=>{
    const amt=num(o.amount);
    if(amt<=0){ toast(L('रकम 0 से ज़्यादा होनी चाहिए','Amount must be > 0'),{type:'bad'}); return; }
    if(amt>rec+0.01){ toast(L('घटाई जा सकने वाली रकम वसूली से ज़्यादा नहीं','Cannot subtract more than collected'),{type:'bad'}); return; }
    const shouldLink=o.subFromLedger==='yes' || (o.subFromLedger==='auto' && d.linkToLedger && d.customerId);
    const targetCustomerId=shouldLink?(d.customerId||''):'';
    withUndo(L('वसूली घटाई','Collection reduced'),()=>{
      d.received=num(d.received)-amt;
      if(shouldLink && targetCustomerId){
        const partyLabel=o.subtractFrom==='party1'?(d.party1||''):o.subtractFrom==='party2'?(d.party2||''):'';
        const note=L('रजिस्ट्री वसूली घटाई','Registry collection reduced')+' '+d.docNo+(o.reason?': '+o.reason:'')+(partyLabel?' ('+partyLabel+')':'');
        DB.ledgerEntries.push({id:uid(),customerId:targetCustomerId,type:'charge',date:today(),amount:amt,note,createdAt:Date.now()});
      }
    });
    closeModal(); toast(L('वसूली घटाई — उधार में बकाया बढ़ा','Collection reduced — Udhar due increased'),{type:'warn'});
  });
}
